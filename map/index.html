    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #2a2a2a;
      color: #f0ede8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px 24px 12px;
      background: linear-gradient(180deg, #0d1117 0%, rgba(13,17,23,0.95) 100%);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 10;
      flex-shrink: 0;
    }

    .logo-pill {
      background: #c8102e;
      color: white;
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      letter-spacing: 0.04em;
      padding: 6px 14px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .header-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: #f0ede8;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 12px;
      color: #8a8a8a;
      margin-top: 2px;
    }



    #map {
      flex: 1;
      position: relative;
    }

    /* Station popup */
    .maplibregl-popup-content {
      background: #1a1f2e;
      color: #f0ede8;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      min-width: 160px;
    }

    .maplibregl-popup-content h3 {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      margin-bottom: 4px;
      color: #f0ede8;
    }

    .maplibregl-popup-content p {
      color: #8a9aaa;
      font-size: 12px;
      line-height: 1.5;
    }

    .maplibregl-popup-tip { border-top-color: #1a1f2e !important; }

    .maplibregl-popup-close-button {
      color: #666;
      font-size: 16px;
    }

    .footer-bar {
      background: #0d1117;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 8px 24px;
      font-size: 11px;
      color: #555;
      display: flex;
      gap: 24px;
      flex-shrink: 0;
    }

    .stat {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .stat-val {
      color: #3B9ED8;
      font-weight: 600;
      font-size: 13px;
    }


    .style-switcher {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 5;
      display: flex;
      gap: 0;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .style-btn {
      background: rgba(13,17,23,0.85);
      color: #aaa;
      border: 1px solid rgba(255,255,255,0.1);
      border-right: none;
      padding: 6px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .style-btn:last-child { border-right: 1px solid rgba(255,255,255,0.1); }

    .style-btn:hover { background: rgba(30,36,48,0.9); color: #ddd; }

    .style-btn.active {
      background: rgba(200,16,46,0.7);
      color: #fff;
      border-color: rgba(200,16,46,0.5);
    }

    .layer-toggles {
      position: absolute;
      top: 10px;
      right: 50px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .layer-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(13,17,23,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 5px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      color: #ccc;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    .layer-toggle:hover { background: rgba(30,36,48,0.9); }

    .layer-toggle.off {
      opacity: 0.4;
    }

    .layer-toggle .swatch {
      width: 20px;
      height: 4px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .layer-toggle .swatch.dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    .toggle-divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 2px 0;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Layers menu button — hidden on desktop */
    .layers-menu-btn {
      display: none;
      margin-left: auto;
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: #ccc;
      font-size: 20px;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .layers-menu-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }

    /* Backdrop — hidden by default */
    .layer-toggles-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 19;
    }
    .layer-toggles-backdrop.open { display: block; }

    /* Tram-train animation element */
    .tram-train {
      position: fixed;
      width: 150px;
      height: auto;
      pointer-events: none;
      z-index: 50;
      display: none;
      will-change: transform;
    }

    /* ---- Mobile overrides ---- */
    @media (max-width: 768px) {
      header { padding: 10px 14px 8px; gap: 12px; }
      .header-text h1 { font-size: 16px; }
      .header-text p { display: none; }
      .layers-menu-btn { display: flex; }

      .layer-toggles {
        display: none !important;
        position: fixed;
        top: 0;
        right: 0;
        height: 100vh;
        width: 220px;
        padding-top: 56px;
        background: rgba(13,17,23,0.95);
        border-left: 1px solid rgba(255,255,255,0.1);
        box-shadow: -4px 0 24px rgba(0,0,0,0.5);
        z-index: 20;
        overflow-y: auto;
      }
      .layer-toggles.open { display: flex !important; }

      .style-btn { padding: 4px 8px; font-size: 10px; }
      .footer-bar { display: none; }
    }
  </style>

<script>
  // ---------------------------------------------------------------------------
  // Stitch an array of LineString features into one continuous coordinate array.
  // Matches segment endpoints by exact coordinate key, walks the chain from one
  // dangling end to the other, reversing segments as needed.
  // ---------------------------------------------------------------------------
  function stitchSegments(features) {
    const segments = features
      .filter(f => f.geometry.type === 'LineString')
      .map(f => f.geometry.coordinates);

    if (segments.length === 0) return [];
    if (segments.length === 1) return segments[0];

    const key = (c) => c[0].toFixed(7) + ',' + c[1].toFixed(7);

    // Build adjacency: coordKey → [{ idx, end }]
    const adj = {};
    segments.forEach((coords, i) => {
      const sk = key(coords[0]);
      const ek = key(coords[coords.length - 1]);
      (adj[sk] = adj[sk] || []).push({ idx: i, end: 'start' });
      (adj[ek] = adj[ek] || []).push({ idx: i, end: 'end' });
    });

    // Find a dangling endpoint (appears only once) — that's one end of the chain
    let cursor = null;
    for (const [k, entries] of Object.entries(adj)) {
      if (entries.length === 1) { cursor = k; break; }
    }
    if (!cursor) cursor = key(segments[0][0]); // fallback: start of first segment

    // Walk the chain
    const used = new Set();
    const result = [];

    while (cursor && adj[cursor]) {
      const next = adj[cursor].find(e => !used.has(e.idx));
      if (!next) break;

      used.add(next.idx);
      const coords = segments[next.idx];

      if (next.end === 'start') {
        // Entered from start → traverse forward
        result.push(...(result.length ? coords.slice(1) : coords));
        cursor = key(coords[coords.length - 1]);
      } else {
        // Entered from end → traverse backward
        const reversed = [...coords].reverse();
        result.push(...(result.length ? reversed.slice(1) : reversed));
        cursor = key(coords[0]);
      }
    }

    return result;
  }

  // ---------------------------------------------------------------------------
  // Map setup
  // ---------------------------------------------------------------------------
  const map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        'osm': {
          type: 'raster',
          tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
          tileSize: 256,
          attribution: '© OpenStreetMap contributors'
        }
      },
      layers: [{
        id: 'osm',
        type: 'raster',
        source: 'osm',
        paint: {
          'raster-opacity': 0.85,
          'raster-saturation': -0.7,
          'raster-brightness-min': 0.1,
          'raster-brightness-max': 0.9
        }
      }]
    },
    center: [-3.2000, 55.9350],
    zoom: 12.5,
    attributionControl: false
  });

  map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

  // --- Basemap styles ---
  const basemaps = {
    dark: {
      tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
      paint: {
        'raster-opacity': 0.85,
        'raster-saturation': -0.7,
        'raster-brightness-min': 0.1,
        'raster-brightness-max': 0.9
      }
    },
    standard: {
      tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
      paint: {
        'raster-opacity': 1,
        'raster-saturation': -0.15,
        'raster-brightness-min': 0.0,
        'raster-brightness-max': 1.0
      }
    },
    buildings: {
      tiles: ['https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png'],
      paint: {
        'raster-opacity': 1,
        'raster-saturation': -0.1,
        'raster-brightness-min': 0.0,
        'raster-brightness-max': 1.0
      }
    },
    satellite: {
      tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
      paint: {
        'raster-opacity': 1,
        'raster-saturation': 0,
        'raster-brightness-min': 0.0,
        'raster-brightness-max': 1.0
      }
    }
  };

  // Style switcher click handler
  document.querySelectorAll('.style-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const styleName = btn.dataset.style;
      const cfg = basemaps[styleName];
      if (!cfg) return;

      // Update active button
      document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Swap tile source: remove old layer+source, add new ones before overlays
      const firstOverlay = map.getStyle().layers.find(l => l.id !== 'osm');
      if (map.getLayer('osm')) map.removeLayer('osm');
      if (map.getSource('osm')) map.removeSource('osm');

      map.addSource('osm', {
        type: 'raster',
        tiles: cfg.tiles,
        tileSize: 256,
        attribution: '© OpenStreetMap contributors'
      });

      map.addLayer({
        id: 'osm',
        type: 'raster',
        source: 'osm',
        paint: cfg.paint
      }, firstOverlay ? firstOverlay.id : undefined);
    });
  });

  // Layer toggle click handler
  document.querySelectorAll('.layer-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const layerIds = btn.dataset.layers.split(',');
      const isOff = btn.classList.toggle('off');
      const visibility = isOff ? 'none' : 'visible';
      layerIds.forEach(id => {
        if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', visibility);
      });
    });
  });

  // Mobile layers drawer
  const layersBtn = document.querySelector('.layers-menu-btn');
  const layerTogglesEl = document.querySelector('.layer-toggles');
  const backdrop = document.querySelector('.layer-toggles-backdrop');
  function closeLayers() {
    layerTogglesEl.classList.remove('open');
    backdrop.classList.remove('open');
  }
  layersBtn.addEventListener('click', () => {
    const isOpen = layerTogglesEl.classList.toggle('open');
    backdrop.classList.toggle('open', isOpen);
  });

    let frame = 0;
    // All dash layers that animate forward
    const fwdDashLayers = [
      'south-sub-dashes-1', 'tram-dashes', 'borders-dashes',
      'ecml-dashes', 'egml-dashes', 'carstairs-dashes',
      'leith-docks-dashes', 'millerhill-dashes',
      'tram-se-proposed-dashes', 'orchard-brae-dashes', 'roseburn-dashes'
    ];
    function animateDashes() {
      if (++frame % 6 === 0) {
        const fwdDash = dashSeq[stepFwd];
        const revDash = dashSeq[stepRev];
        fwdDashLayers.forEach(id => map.setPaintProperty(id, 'line-dasharray', fwdDash));
        map.setPaintProperty('south-sub-dashes-2', 'line-dasharray', revDash);
        stepFwd = (stepFwd + 1) % seqLen;
        stepRev = (stepRev - 1 + seqLen) % seqLen;
      }
      requestAnimationFrame(animateDashes);
    }
    animateDashes();

    // Pulse the outer glow
    let glowOpacity = 0.10;
    let glowDir = 1;
    function pulseGlow() {
      glowOpacity += glowDir * 0.001;
      if (glowOpacity > 0.18) glowDir = -1;
      if (glowOpacity < 0.05) glowDir = 1;
      map.setPaintProperty('south-sub-glow-outer', 'line-opacity', glowOpacity);
      requestAnimationFrame(pulseGlow);
    }
    pulseGlow();

  });

  // ---- Tram-train edge animations ----
  // Up to 6 trains, each travelling along a single random edge.
  // Image: nose LEFT, wheels BOTTOM.  scaleX:-1 flips to nose RIGHT.
  // Rotation then sets direction:
  //   0°   → bottom edge L→R   (nose RIGHT, wheels DOWN)
  //  -90°  → right edge  B→T   (nose UP,    wheels RIGHT)
  //  -180° → top edge    R→L   (nose LEFT,  wheels UP)
  //  -270° → left edge   T→B   (nose DOWN,  wheels LEFT)
  (function () {
    const MAX_TRAINS = 6;
    const TRAIN_W = 150;
    const TRAIN_H = 26;
    const SPEED = 300; // px per second
    let active = 0;
    let enabled = true;

    // Toggle button
    const toggleBtn = document.getElementById('train-anim-toggle');
    toggleBtn.addEventListener('click', () => {
      enabled = !toggleBtn.classList.toggle('off');
      if (!enabled) {
        // Remove all on-screen trains immediately
        document.querySelectorAll('.tram-train').forEach(el => {
          gsap.killTweensOf(el);
          el.remove();
        });
        active = 0;
      }
    });

    function createTrainEl() {
      const img = document.createElement('img');
      img.className = 'tram-train';
      img.src = 'assets/tram-train-small.png';
      img.alt = '';
      document.body.appendChild(img);
      return img;
    }

    function launchOne() {
      if (!enabled || active >= MAX_TRAINS) return;
      active++;

      const el = createTrainEl();
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const inset = TRAIN_H / 2;

      // Pick a completely random edge + direction.
      // Image base: nose LEFT, wheels DOWN.
      // GSAP applies: scale first, then rotate.
      //
      // scaleX:-1, rot:0   → nose RIGHT, wheels DOWN
      // scaleX:-1, rot:90  → nose UP,    wheels RIGHT
      // scaleX:-1, rot:180 → nose LEFT,  wheels UP
      // scaleX:-1, rot:-90 → nose DOWN,  wheels LEFT
      // scaleX: 1, rot:0   → nose LEFT,  wheels DOWN
      // scaleX: 1, rot:90  → nose DOWN,  wheels RIGHT
      // scaleX: 1, rot:180 → nose RIGHT, wheels UP
      // scaleX: 1, rot:-90 → nose UP,    wheels LEFT

      const edge = Math.floor(Math.random() * 4); // 0=bottom,1=right,2=top,3=left
      const fwd = Math.random() < 0.5;

      let startX, startY, endX, endY, rot, sx, dist;

      switch (edge) {
        case 0: // bottom — wheels DOWN
          startY = vh - inset; endY = vh - inset;
          dist = vw + TRAIN_W * 2;
          if (fwd) { // L→R  nose RIGHT
            rot = 0; sx = -1;
            startX = -TRAIN_W; endX = vw + TRAIN_W;
          } else {   // R→L  nose LEFT
            rot = 0; sx = 1;
            startX = vw + TRAIN_W; endX = -TRAIN_W;
          }
          break;
        case 1: // right — wheels RIGHT
          startX = vw - inset; endX = vw - inset;
          dist = vh + TRAIN_W * 2;
          if (fwd) { // B→T  nose UP
            rot = 90; sx = -1;
            startY = vh + TRAIN_W; endY = -TRAIN_W;
          } else {   // T→B  nose DOWN
            rot = 90; sx = 1;
            startY = -TRAIN_W; endY = vh + TRAIN_W;
          }
          break;
        case 2: // top — wheels UP
          startY = inset; endY = inset;
          dist = vw + TRAIN_W * 2;
          if (fwd) { // L→R  nose RIGHT
            rot = 180; sx = 1;
            startX = -TRAIN_W; endX = vw + TRAIN_W;
          } else {   // R→L  nose LEFT
            rot = 180; sx = -1;
            startX = vw + TRAIN_W; endX = -TRAIN_W;
          }
          break;
        case 3: // left — wheels LEFT
          startX = inset; endX = inset;
          dist = vh + TRAIN_W * 2;
          if (fwd) { // B→T  nose UP
            rot = -90; sx = 1;
            startY = vh + TRAIN_W; endY = -TRAIN_W;
          } else {   // T→B  nose DOWN
            rot = -90; sx = -1;
            startY = -TRAIN_W; endY = vh + TRAIN_W;
          }
          break;
      }

      el.style.display = 'block';

      gsap.set(el, {
        x: startX, y: startY,
        rotation: rot, scaleX: sx, scaleY: 1,
        xPercent: -50, yPercent: -50
      });

      gsap.to(el, {
        x: endX, y: endY,
        duration: dist / SPEED,
        ease: 'none',
        onComplete: () => {
          el.remove();
          active--;
        }
      });
    }

    // Continuous scheduler — tries to launch a train every 5–15s,
    // respecting the cap of 6 on screen at any time.
    // First train appears within 0–30s of page load.
    function tick() {
      launchOne();
      const next = 5000 + Math.random() * 10000; // 5–15s between attempts
      setTimeout(tick, next);
    }

    // Initial delay: random 0–30s
    setTimeout(tick, Math.random() * 30000);
  })();
</script>
</body>
</html>
