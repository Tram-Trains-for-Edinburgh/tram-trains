<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">

  <circle cx="24" cy="24" r="24" fill="#012440"/>

  <!-- Outer ring — subtle -->
  <circle cx="24" cy="24" r="20" fill="none" stroke="#0E4973" stroke-width="1.5"/>

  <!-- Upper arrow — pointing right, top half -->
  <polygon points="14,10 34,10 34,20 40,15 34,10" fill="none"/>
  <!-- Upper arrow: shaft + head -->
  <rect x="12" y="13" width="20" height="5" rx="1" fill="#FFFFFF"/>
  <polygon points="30,10 40,15.5 30,21" fill="#FFFFFF"/>

  <!-- Lower arrow — pointing left, bottom half -->
  <rect x="16" y="30" width="20" height="5" rx="1" fill="#860C2D"/>
  <polygon points="18,27 8,32.5 18,38" fill="#860C2D"/>

  <!-- Central circle — the yin/yang pivot point -->
  <circle cx="24" cy="24" r="3.5" fill="#FFFFFF"/>
  <circle cx="24" cy="24" r="1.8" fill="#012440"/>

</svg>
